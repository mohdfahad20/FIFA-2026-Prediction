# render.yaml
# Deploy the FIFA 2026 FastAPI backend on Render (free tier).
#
# Setup steps:
#   1. Push this file to your repo root.
#   2. In Render Dashboard → New → Blueprint → connect your repo.
#   3. Add environment variables (see envVars below).
#   4. After first deploy, copy the service's Deploy Hook URL and store it
#      as RENDER_DEPLOY_HOOK_FIFA in your GitHub repo secrets.

services:
  - type: web
    name: fifa-predictor-api
    runtime: python
    region: oregon
    plan: free

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"

      - key: GITHUB_REPO
        value: mohdfahad20/FIFA-2026-Prediction

      - key: ARTIFACTS_TAG
        value: latest-data

      - key: ARTIFACT_NAME
        value: artifacts.zip

      - key: GITHUB_TOKEN
        sync: false

      - key: FOOTBALL_DATA_API_KEY
        sync: false
